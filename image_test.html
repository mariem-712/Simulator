<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCC Image Simulator Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff00; /* لون التيرمينال الأخضر الكلاسيكي */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #ffffff; }
        .dashboard-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .monitor {
            flex: 2;
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .monitor img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 4px;
            display: block;
            margin: 0 auto;
        }
        .panel {
            flex: 1;
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        button {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            transition: 0.2s;
        }
        button:hover { background-color: #555; }
        button:active { background-color: #00ff00; color: #000; }
        #status {
            font-weight: bold;
            margin-bottom: 15px;
        }
        .status-offline { color: #ff4444; }
        .status-online { color: #00ff00; }
        pre {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            color: #00bcd4;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h1>🛰️ MCC Image Stream Dashboard</h1>
    
    <div class="controls">
        <button onclick="connectWS()">1. Connect</button>
        <button onclick="sendCommand({type: 'start_stream', interval: 1})">2. Start Auto-Stream (1s)</button>
        <button onclick="sendCommand({type: 'stop_stream'})">3. Stop Stream</button>
        <button onclick="sendCommand({type: 'get_next_frame'})">Get Next Frame (Manual)</button>
        <button onclick="sendCommand({type: 'reset_cursor'})">Reset Cursor</button>
    </div>

    <div class="dashboard-container">
        <div class="monitor">
            <h3 style="margin-top: 0; color: #aaa;">Live Camera Feed</h3>
            <img id="video-feed" src="https://via.placeholder.com/640x480.png?text=NO+SIGNAL" alt="Camera Feed">
        </div>

        <div class="panel">
            <div id="status" class="status-offline">System Status: Disconnected 🔴</div>
            <h3 style="margin-top: 0; color: #aaa;">Telemetry Data</h3>
            <pre id="telemetry-box">Waiting for data...</pre>
        </div>
    </div>

    <script>
        let ws;
        const imgElement = document.getElementById('video-feed');
        const telemetryBox = document.getElementById('telemetry-box');
        const statusElement = document.getElementById('status');

        function connectWS() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                alert("Already connected!");
                return;
            }

            
            ws = new WebSocket("ws://localhost:8084/ws/images");

            ws.onopen = function() {
                statusElement.innerHTML = "System Status: Connected 🟢";
                statusElement.className = "status-online";
                telemetryBox.innerHTML = "Connection established. Ready to receive commands.";
            };

            ws.onmessage = function(event) {
                const response = JSON.parse(event.data);

               
                if (response.type === "frame") {
                    const frameData = response.frame;
                    
                    // 1. تحديث الصورة (السحر بيحصل هنا)
                    if (frameData.image && frameData.image.available) {
                        const base64Data = frameData.image.data;
                        const mediaType = frameData.image.media_type || "image/jpeg";
                        imgElement.src = `data:${mediaType};base64,${base64Data}`;
                    }

                   
                    const metadataToDisplay = {
                        cursor: response.cursor,
                        total_frames: response.total_frames,
                        filename: frameData.filename,
                        label: frameData.label,
                        split: frameData.split,
                        timestamp: response.streamed_at
                    };
                    telemetryBox.innerHTML = JSON.stringify(metadataToDisplay, null, 2);
                } 
               
                else {
                    telemetryBox.innerHTML = JSON.stringify(response, null, 2);
                    if (response.type === "exhausted") {
                        imgElement.src = "https://via.placeholder.com/640x480.png?text=END+OF+DATASET";
                    }
                }
            };

            ws.onclose = function() {
                statusElement.innerHTML = "System Status: Disconnected 🔴";
                statusElement.className = "status-offline";
            };

            ws.onerror = function(error) {
                console.error("WebSocket Error:", error);
                telemetryBox.innerHTML = "Error connecting to WebSocket.";
            };
        }

        function sendCommand(commandObj) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(commandObj));
            } else {
                alert("Please click 'Connect' first!");
            }
        }
    </script>
</body>
</html>
