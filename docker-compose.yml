services:
  telemetry-api:
    build: .
    container_name: telemetry_api_service
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - skyfield_data:/root/skyfield-data
    restart: unless-stopped

  command-sim:
    build: .
    container_name: command_simulator_service
    command: uvicorn command2:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    volumes:
      - ./:/app
    depends_on:
      - telemetry-api
    restart: unless-stopped

volumes:
  skyfield_data: